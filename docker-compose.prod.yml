version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      # Build args are read from .env.local during docker-compose build
      args:
        - NEXT_PUBLIC_SUPABASE_URL
        - NEXT_PUBLIC_SUPABASE_ANON_KEY
        - NEXT_PUBLIC_SITE_URL
    container_name: bac-tutor-frontend-prod
    ports:
      - "3000:3000"
    # Load environment variables from .env file first
    env_file:
      - ./frontend/.env
    environment:
      # Docker-specific overrides only
      - NODE_ENV=production
      # Internal Docker network URL for the NestJS backend.
      - BACKEND_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - bac-tutor-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: bac-tutor-backend-prod
    ports:
      - "3001:5000"
    # Load environment variables from .env file first
    env_file:
      - ./backend/.env
    environment:
      # Docker-specific overrides only
      - NODE_ENV=production
      - PORT=5000
      # Internal Docker network URL for the Next.js frontend.
      - FRONTEND_URL=http://frontend:3000
    networks:
      - bac-tutor-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  bac-tutor-network:
    driver: bridge
    name: bac-tutor-network