version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: bac-tutor-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      # Source code: Read-write bind mount (enables hot reload on Windows)
      - ./frontend:/app
      # Artifacts & Deps: Writable named volumes (Container specific)
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    # Load environment variables from .env file first
    env_file:
      - ./frontend/.env.local
    environment:
      # Docker-specific overrides only (these take precedence over env_file)
      - NODE_ENV=development
      # Enable file watching/polling for hot reload in Docker
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      # Internal Docker network URLs (use container names instead of localhost)
      - LANGGRAPH_DEPLOYMENT_URL=http://agent:8123
      - NEXT_PUBLIC_AGENT_URL=http://localhost:8123/agent
      - BACKEND_URL=http://backend:5000
    depends_on:
      - agent
    networks:
      - bac-tutor-network
    restart: unless-stopped
    stdin_open: true
    tty: true

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: bac-tutor-backend-dev
    # No external ports - backend only accessible within Docker network
    # Frontend proxies requests via Next.js API routes
    expose:
      - "5000"
    volumes:
      # Source code: Read-write bind mount (enables hot reload)
      - ./backend:/app
      # Dependencies: Named volume to avoid overwriting with host node_modules
      - backend_node_modules:/app/node_modules
      # Note: dist folder is NOT a named volume - NestJS watch mode needs
      # to delete/recreate it freely without Docker volume locks
    # Load environment variables from .env file first
    env_file:
      - ./backend/.env.local
    environment:
      # Docker-specific overrides only
      - NODE_ENV=development
      - PORT=5000
      # Internal Docker network URLs (use container names)
      - FRONTEND_URL=http://frontend:3000
      - AGENT_URL=http://agent:8123
      # PostgreSQL connection for the shared LangGraph checkpointer.
      # Same database the legacy Python agent uses, so checkpoints written by
      # one are readable by the other during the migration window.
      - POSTGRES_URI=postgresql://langgraph:langgraph_dev_password@postgres:5432/langgraph_checkpoints
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bac-tutor-network
    restart: unless-stopped
    stdin_open: true
    tty: true

  # PostgreSQL for LangGraph checkpoint persistence
  postgres:
    image: postgres:16-alpine
    container_name: bac-tutor-postgres-dev
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=langgraph
      - POSTGRES_PASSWORD=langgraph_dev_password
      - POSTGRES_DB=langgraph_checkpoints
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bac-tutor-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langgraph -d langgraph_checkpoints"]
      interval: 10s
      timeout: 5s
      retries: 5

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile.dev
    container_name: bac-tutor-agent-dev
    ports:
      - "8123:8123"
    volumes:
      # Source code: Read-write bind mount (enables hot reload)
      - ./agent:/app
      - agent_venv:/app/.venv
    # Load environment variables from .env file first
    env_file:
      - ./agent/.env
    environment:
      # Docker-specific overrides only
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      # Prevent Python from trying to write .pyc files to the read-only /app
      - PYTHONDONTWRITEBYTECODE=1
      - LANGGRAPH_ENV=development
      # Internal Docker network URLs (use container names)
      - FRONTEND_URL=http://frontend:3000
      - BACKEND_URL=http://backend:5000
      # PostgreSQL connection for LangGraph checkpoints
      - POSTGRES_URI=postgresql://langgraph:langgraph_dev_password@postgres:5432/langgraph_checkpoints
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bac-tutor-network
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  agent_venv:
  frontend_node_modules:
  frontend_next:
  backend_node_modules:

networks:
  bac-tutor-network:
    driver: bridge
    name: bac-tutor-network